version: "3.9"

services:
  # api:
  #   build: .
  #   ports:
  #     - "5003:5003"
  #   depends_on:
  #     - postgres

  postgres:
    image: postgres:16
    container_name: auto_rental_system
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "54321"
      POSTGRES_DB: AutoRental
    ports:
      - "5434:5432"  
    volumes:
      - postgres_data_new:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin_auto.rental
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5052:80"     
    depends_on:
      - postgres

volumes:
  postgres_data_new:
